<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="#{admin.users.title}">Users</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-people me-2"></i><span th:text="#{admin.users.title}">Users</span></h4>
    </div>


    <!-- Filter Form -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/admin/users}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small text-muted" th:text="#{admin.users.filter.email}">Email</label>
                    <input type="text" name="email" class="form-control"
                           th:value="${filter.email}" th:placeholder="#{admin.users.filter.email.placeholder}"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted" th:text="#{admin.users.filter.role}">Role</label>
                    <select name="role" class="form-select">
                        <option value="" th:text="#{admin.users.filter.role.all}">All Roles</option>
                        <option th:each="r : ${roleOptions}"
                                th:value="${r.name()}"
                                th:text="${#messages.msg('admin.role.' + r.name().toLowerCase())}"
                                th:selected="${filter.role == r}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted" th:text="#{admin.users.filter.status}">Status</label>
                    <select name="active" class="form-select">
                        <option value="" th:text="#{admin.users.filter.status.all}">All Status</option>
                        <option value="true" th:selected="${filter.active == true}" th:text="#{admin.users.status.active}">Active</option>
                        <option value="false" th:selected="${filter.active == false}" th:text="#{admin.users.status.inactive}">Inactive</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i><span th:text="#{admin.common.search}">Search</span>
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary w-100" th:text="#{admin.common.reset}">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">#</th>
                    <th th:text="#{admin.users.table.email}">Email</th>
                    <th th:text="#{admin.users.table.fullName}">Full Name</th>
                    <th th:text="#{admin.users.table.role}">Role</th>
                    <th th:text="#{admin.users.table.status}">Status</th>
                    <th th:text="#{admin.users.table.createdAt}">Created At</th>
                    <th class="text-center" th:text="#{admin.users.table.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4" th:text="#{admin.users.empty}">No users found.</td>
                </tr>
                <tr th:each="user, stat : ${users.content}">
                    <td class="ps-3" th:text="${users.number * users.size + stat.index + 1}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.fullName != null ? user.fullName : '—'}"></td>
                    <td>
                        <span th:class="${user.role.name() == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-secondary'"
                              th:text="${#messages.msg('admin.role.' + user.role.name().toLowerCase())}"></span>
                    </td>
                    <td>
                        <span th:class="${user.active} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                              th:text="${user.active} ? #messages.msg('admin.users.status.active') : #messages.msg('admin.users.status.inactive')"></span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="text-center">
                        <form th:action="@{/admin/users/{id}/toggle-active(id=${user.id})}" method="post">
                            <button type="submit"
                                    th:class="${user.active} ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'"
                                    th:text="${user.active} ? #messages.msg('admin.users.action.disable') : #messages.msg('admin.users.action.enable')">
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${users.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li th:class="${users.hasPrevious()} ? 'page-item' : 'page-item disabled'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${users.number - 1}, size=${users.size}, email=${filter.email}, role=${filter.role}, active=${filter.active})}">
                    &laquo;
                </a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                th:class="${i == users.number} ? 'page-item active' : 'page-item'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${i}, size=${users.size}, email=${filter.email}, role=${filter.role}, active=${filter.active})}"
                   th:text="${i + 1}"></a>
            </li>
            <li th:class="${users.hasNext()} ? 'page-item' : 'page-item disabled'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${users.number + 1}, size=${users.size}, email=${filter.email}, role=${filter.role}, active=${filter.active})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
