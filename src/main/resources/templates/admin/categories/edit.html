<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Edit Category</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit Category</h4>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0" style="max-width: 600px;">
        <div class="card-body p-4">
            <form th:action="@{/admin/categories/{id}/edit(id=${categoryId})}"
                  th:object="${categoryRequest}" method="post">

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}"
                           th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                           placeholder="Category name"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <!-- Classify -->
                <div class="mb-3">
                    <label class="form-label">Classify <span class="text-danger">*</span></label>
                    <select th:field="*{classify}"
                            th:class="${#fields.hasErrors('classify')} ? 'form-select is-invalid' : 'form-select'">
                        <option value="">— Select —</option>
                        <option th:each="c : ${classifyOptions}"
                                th:value="${c.name()}"
                                th:text="${c.name()}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('classify')}"
                         th:errors="*{classify}"></div>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}"
                              th:class="${#fields.hasErrors('description')} ? 'form-control is-invalid' : 'form-control'"
                              rows="4" placeholder="Optional description..."></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>
</body>
</html>
