<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>Dashboard</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h4>
    </div>

    <div class="row g-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="card-title text-muted mb-1">Welcome back 👋</h5>
                    <p class="card-text text-secondary">
                        You are logged in to the <strong>Foods &amp; Drinks</strong> admin panel.
                        Use the sidebar to manage users, categories, products, orders and suggestions.
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
