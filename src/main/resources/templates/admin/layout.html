<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Admin | Foods &amp; Drinks" th:text="#{admin.layout.title.default}">Admin | Foods &amp; Drinks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .sidebar {
            min-height: 100vh;
            width: 240px;
            background: #212529;
            position: fixed;
            top: 0; left: 0;
            padding-top: 60px;
            z-index: 100;
        }
        .sidebar .nav-link {
            color: #adb5bd;
            padding: .6rem 1.25rem;
            font-size: .9rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: #343a40;
            border-radius: 4px;
        }
        .sidebar .nav-link i { margin-right: .5rem; }
        .main-content {
            margin-left: 240px;
            padding-top: 60px;
        }
        .navbar-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 200;
            height: 56px;
        }
    </style>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-top">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-egg-fried me-2"></i><span th:text="#{admin.layout.brand}">Foods &amp; Drinks Admin</span>
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">Admin</span>
            </span>
            <form th:action="@{/admin/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i><span th:text="#{admin.common.logout}">Logout</span>
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<nav class="sidebar d-flex flex-column pt-3">
    <ul class="nav flex-column gap-1 px-2">
        <li class="nav-item">
            <a th:href="@{/admin/dashboard}"
               th:classappend="${#request.requestURI == '/admin/dashboard'} ? 'active'"
               class="nav-link">
                <i class="bi bi-speedometer2"></i><span th:text="#{admin.sidebar.dashboard}">Dashboard</span>
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/users}"
               th:classappend="${#request.requestURI.startsWith('/admin/users')} ? 'active'"
               class="nav-link">
                <i class="bi bi-people"></i><span th:text="#{admin.sidebar.users}">Users</span>
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/categories}"
               th:classappend="${#request.requestURI.startsWith('/admin/categories')} ? 'active'"
               class="nav-link">
                <i class="bi bi-tags"></i><span th:text="#{admin.sidebar.categories}">Categories</span>
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/products}"
               th:classappend="${#request.requestURI.startsWith('/admin/products')} ? 'active'"
               class="nav-link">
                <i class="bi bi-box-seam"></i><span th:text="#{admin.sidebar.products}">Products</span>
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/orders}"
               th:classappend="${#request.requestURI.startsWith('/admin/orders')} ? 'active'"
               class="nav-link">
                <i class="bi bi-cart3"></i><span th:text="#{admin.sidebar.orders}">Orders</span>
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/suggestions}"
               th:classappend="${#request.requestURI.startsWith('/admin/suggestions')} ? 'active'"
               class="nav-link">
                <i class="bi bi-lightbulb"></i><span th:text="#{admin.sidebar.suggestions}">Suggestions</span>
            </a>
        </li>
    </ul>
</nav>

<!-- Main Content -->
<div class="main-content">
    <div class="container-fluid p-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div layout:fragment="content">
            <!-- page content injected here -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
