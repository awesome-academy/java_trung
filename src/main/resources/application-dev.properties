server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/foods_drinks?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Aa@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=5f3e9a1b2c3d5f6a7b8c9d0e1f2a3c5d6e7f8a9b0c1d2ea5b6c7d8e9f
app.jwt.access-token-expiration=900000

# SPRINGDOC ? Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# THYMELEAF
spring.thymeleaf.cache=false

# LOGGING
logging.level.com.example.foodsdrinks=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
